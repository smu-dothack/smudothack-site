<a href="{{ .Permalink }}" class="block rounded-xl border border-border bg-surface hover:border-accent transition-colors overflow-hidden group">
  {{ with .Params.poster }}
    <div class="aspect-video overflow-hidden">
      <img src="{{ . }}" alt="{{ $.Title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
    </div>
  {{ end }}
  <div class="p-5">
    {{/* Status badge */}}
    {{ with .Params.status }}
      <span class="inline-block px-2 py-0.5 text-xs font-mono rounded
        {{ if eq . "up-next" }}bg-accent/20 text-accent
        {{ else if eq . "planning" }}bg-yellow-500/20 text-yellow-400
        {{ else }}bg-muted/20 text-muted{{ end }}"
        data-status="{{ . }}">
        {{ . | humanize }}
      </span>
    {{ end }}
    <h3 class="text-lg font-heading font-semibold mt-2 mb-1 group-hover:text-accent transition-colors">{{ .Title }}</h3>
    {{ with .Params.event_date }}
      <p class="text-sm text-muted">{{ . }}</p>
    {{ end }}
    {{ with .Description }}
      <p class="text-sm text-muted mt-2 line-clamp-2">{{ . }}</p>
    {{ end }}
  </div>
</a>
