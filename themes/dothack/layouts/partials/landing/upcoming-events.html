{{ $events := where (where site.RegularPages "Section" "events") "Params.status" "up-next" }}
{{ if $events }}
<section class="py-20 border-t border-border">
  <div class="container mx-auto px-6">
    <div class="flex items-center justify-between mb-12">
      <h2 class="text-3xl font-heading font-bold">Upcoming Events</h2>
      <a href="/events/" class="text-sm text-accent hover:text-accent-hover transition-colors">
        View all &rarr;
      </a>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      {{ range first 3 $events }}
        {{ partial "event-card.html" . }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
