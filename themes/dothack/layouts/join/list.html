{{ define "main" }}
<div class="container mx-auto px-6 py-16 max-w-3xl">
  <h1 class="text-4xl font-heading font-bold mb-12">{{ .Title }}</h1>

  <div class="prose prose-invert max-w-none mb-12">
    {{ .Content }}
  </div>

  {{/* CTA button */}}
  {{ with .Site.Params.joinFormURL }}
    <div class="rounded-2xl bg-surface border border-border p-8 text-center">
      <h2 class="text-2xl font-heading font-bold mb-3">Ready?</h2>
      <p class="text-muted mb-6">Fill out the form and we'll add you to our community channels.</p>
      <a href="{{ . }}" target="_blank" rel="noopener"
         class="inline-flex items-center gap-2 px-8 py-4 rounded-lg bg-accent text-bg font-semibold text-lg hover:bg-accent-hover transition-colors">
        Sign Up
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
      </a>
    </div>
  {{ end }}
</div>
{{ end }}
